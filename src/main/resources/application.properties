## Properties pertaining to the application database, not to be confused with config.properties which has configuration rates for the business logic.

# JDBC / driver
hibernate.connection.driver_class=com.mysql.cj.jdbc.Driver
hibernate.connection.url=jdbc:mysql://localhost:3306/hotel_test

# (SQLite does not use username/password by default; leave blank or remove)
hibernate.connection.username=user
hibernate.connection.password=123Password
jakarta.persistence.jdbc.user=user
jakarta.persistence.jdbc.password=123Password

# Dialect: must match a dialect class available on the classpath
hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Schema generation:
# update keeps existing data and adds missing tables/columns
# create will drop all existing tables and make from scratch with each run
hibernate.hbm2ddl.auto=create

# Show SQL for debugging
hibernate.show_sql=true
hibernate.format_sql=true

# Session / transaction
hibernate.current_session_context_class=thread

# Small built-in pool for development (not for production)
hibernate.connection.pool_size=5

# Avoid some JDBC metadata lookups that can fail with SQLite drivers
hibernate.temp.use_jdbc_metadata_defaults=false

# JPA-compatible properties (optional, useful if you use JPA APIs)
jakarta.persistence.jdbc.driver=com.mysql.cj.jdbc.Driver
jakarta.persistence.jdbc.url=jdbc:mysql://localhost:3306/hotel_test

# Logging provider (optional)
org.jboss.logging.provider=slf4j

